<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Watchlist – Dashflix</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="watchlist.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5412699736062085"
 crossorigin="anonymous"></script>
</head>
<body>
<div class="shell">

  <!-- CONTENT -->
  <main class="content">

    <div class="wl-top">
      <a href="index.html" class="logo">
        <span class="logo-text">DASHFLIX</span>
      </a>
      <button class="clear-btn" id="clearBtn"><i class="fas fa-trash-alt"></i> Clear All</button>
    </div>

    <div class="section-header" style="padding-top:2px;">
      <h2 class="section-title">My <span>Watchlist</span></h2>
    </div>

    <div class="tab-row">
      <button class="wl-tab active" data-f="all"><i class="fas fa-th"></i> All</button>
      <button class="wl-tab" data-f="movie"><i class="fas fa-film"></i> Movies</button>
      <button class="wl-tab" data-f="tv"><i class="fas fa-tv"></i> Shows</button>
    </div>
    <div class="wl-count" id="wlCount"></div>

    <div class="grid" id="grid"></div>

    <div class="empty-state" id="empty" style="display:none;">
      <i class="fas fa-bookmark"></i>
      <p>Your watchlist is empty.<br>Right-click any poster to save something.</p>
      <div class="browse-links">
        <a href="movies.html" class="browse-link"><i class="fas fa-film"></i> Movies</a>
        <a href="shows.html"  class="browse-link"><i class="fas fa-tv"></i> Shows</a>
      </div>
    </div>

  </main>
</div>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav">
  <a href="index.html"     class="nav-item"><i class="fas fa-home"></i>Home</a>
  <a href="movies.html"    class="nav-item"><i class="fas fa-film"></i>Movies</a>
  <a href="shows.html"     class="nav-item"><i class="fas fa-tv"></i>Shows</a>
  <a href="watchlist.html" class="nav-item active"><i class="fas fa-bookmark"></i>Watchlist</a>
  <button class="nav-item" onclick="toggleTheme()"><i class="fas fa-sun theme-icon"></i>Theme</button>
</nav>

<script src="app.js"></script>
<script src="watchlist.js"></script>
</body>
</html>
